name: CI

on:
  pull_request:

jobs:
  test-db:
    name: Database integration tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ secrets.TEST_POSTGRES_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD || 'postgres' }}
          POSTGRES_DB: ${{ secrets.TEST_POSTGRES_DB || 'garden_test' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations (local)
        run: npm run migrate
        env:
          POSTGRES_URL: postgresql://${{ secrets.TEST_POSTGRES_USER || 'postgres' }}:${{ secrets.TEST_POSTGRES_PASSWORD || 'postgres' }}@localhost:5432/${{ secrets.TEST_POSTGRES_DB || 'garden_test' }}

      - name: Run DB integration tests
        run: npm run test:db
        env:
          POSTGRES_URL: postgresql://${{ secrets.TEST_POSTGRES_USER || 'postgres' }}:${{ secrets.TEST_POSTGRES_PASSWORD || 'postgres' }}@localhost:5432/${{ secrets.TEST_POSTGRES_DB || 'garden_test' }}

  migrate-target:
    name: Migrate target database
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Migrate target database
        if: env.POSTGRES_URL != ''
        run: npm run migrate
